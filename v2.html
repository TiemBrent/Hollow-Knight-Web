<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Knight</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game { position: fixed; transform-origin: top left; }
    iframe { display: block; border: none; }
  </style>
</head>
<body>
  <div id="game">
    <iframe
      id="frame"
      src="https://www.edurocks.org/filestorage/gd/hollow-knight/index.html"
      allowfullscreen
      allow="autoplay; fullscreen *"
      scrolling="no"
    ></iframe>
  </div>

  <script>
    const game  = document.getElementById('game');
    const frame = document.getElementById('frame');

    // Physical target resolution
    const PW = 854;
    const PH = 480;

    // Convert to CSS pixels so the browser rasterizes at exactly PW×PH physical pixels
    const dpr = window.devicePixelRatio || 1;
    const cw  = PW / dpr;
    const ch  = PH / dpr;

    game.style.width   = cw + 'px';
    game.style.height  = ch + 'px';
    frame.style.width  = cw + 'px';
    frame.style.height = ch + 'px';

    function scale() {
      const s = Math.min(window.innerWidth / cw, window.innerHeight / ch);
      game.style.transform = `scale(${s})`;
      game.style.left = `${(window.innerWidth  - cw * s) / 2}px`;
      game.style.top  = `${(window.innerHeight - ch * s) / 2}px`;
    }

    scale();
    window.addEventListener('resize', scale);
  </script>
</body>
</html>
