<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Knight</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #game {
      position: fixed;
      width: 854px;
      height: 480px;
      transform-origin: top left;
    }

    iframe {
      display: block;
      width: 854px;
      height: 480px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="game">
    <iframe
      src="https://www.edurocks.org/filestorage/gd/hollow-knight/index.html"
      allowfullscreen
      allow="autoplay; fullscreen *"
      scrolling="no"
    ></iframe>
  </div>

  <script>
    const game = document.getElementById('game');

    function scale() {
      const s = Math.min(window.innerWidth / 854, window.innerHeight / 480);
      game.style.transform = `scale(${s})`;
      game.style.left = `${(window.innerWidth  - 854 * s) / 2}px`;
      game.style.top  = `${(window.innerHeight - 480 * s) / 2}px`;
    }

    scale();
    window.addEventListener('resize', scale);
  </script>
</body>
</html>
