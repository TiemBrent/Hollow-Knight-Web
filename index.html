<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Knight</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #game-wrapper {
      position: fixed;
      width: 854px;
      height: 480px;
      transform-origin: top left;
      z-index: 10;
    }

    #game-frame {
      display: block;
      width: 854px;
      height: 480px;
      border: none;
      background: #000;
    }
  </style>
</head>
<body>

  <div id="game-wrapper">
    <iframe
      id="game-frame"
      src="https://www.edurocks.org/filestorage/gd/hollow-knight/index.html"
      allowfullscreen
      allow="autoplay; fullscreen *"
      scrolling="no"
      frameborder="0"
    ></iframe>
  </div>

  <script>
    const wrapper = document.getElementById('game-wrapper');
    const BASE_W  = 854;
    const BASE_H  = 480;

    function applyScale() {
      const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
      const left  = (window.innerWidth  - BASE_W * scale) / 2;
      const top   = (window.innerHeight - BASE_H * scale) / 2;
      wrapper.style.transform = `scale(${scale})`;
      wrapper.style.left = `${left}px`;
      wrapper.style.top  = `${top}px`;
    }

    applyScale();
    window.addEventListener('resize', applyScale);
  </script>
</body>
</html>
